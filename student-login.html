<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - NUCI</title>

<link rel="stylesheet" href="css/style.css">

<style>
.login-box{
max-width:450px;
margin:80px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#003366;
}

.login-box input{
width:100%;
padding:14px;
margin-bottom:15px;
font-size:16px;
}

.login-box button{
width:100%;
padding:14px;
background:#0056b3;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.login-box button:hover{
background:#003366;
}

#result{
margin-top:20px;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input type="text" id="studentId" placeholder="Student ID">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="result"></div>

</div>

<script src="js/login.js"></script>

</body>
</html>
